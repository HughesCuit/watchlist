<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist - 股票自选股管理</title>
  
  <!-- External Styles -->
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/main.css">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__logo">
          <div class="sidebar__logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"/>
              <path d="M18 17V9"/>
              <path d="M13 17V5"/>
              <path d="M8 17v-3"/>
            </svg>
          </div>
          <span class="sidebar__logo-text">Watchlist</span>
        </div>
      </div>
      
      <div class="sidebar__content">
        <!-- Categories Section -->
        <div class="sidebar__section">
          <div class="sidebar__section-title">分类</div>
          <div id="sidebarCategories"></div>
          <div id="sidebarCategoryList"></div>
          
          <!-- Add Category Button -->
          <button class="btn btn--ghost" style="width: 100%; margin-top: var(--space-2);" onclick="showCategoryInput()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14"/>
              <path d="M5 12h14"/>
            </svg>
            创建分类
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Toolbar -->
      <header class="toolbar">
        <div class="toolbar__left">
          <button class="icon-btn" id="menuToggle" aria-label="Toggle menu" onclick="toggleSidebar()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="toolbar__title">股票自选股管理</h1>
          
          <!-- Action Buttons -->
          <button class="btn btn--primary" onclick="showStockInput()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14"/>
              <path d="M5 12h14"/>
            </svg>
            添加股票
          </button>
          
          <button class="btn btn--secondary" onclick="toggleSort()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/>
              <path d="M7 12h10"/>
              <path d="M10 18h4"/>
            </svg>
            <span id="sortLabel">添加时间</span>
          </button>
        </div>
        
        <div class="toolbar__right">
          <button class="icon-btn" onclick="showResetConfirm()" aria-label="重置数据" title="重置数据">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </button>
          
          <button class="icon-btn" id="themeToggle" aria-label="切换深色模式" onclick="toggleDarkMode()" title="切换深色模式">
            <span id="themeIcon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2"/>
                <path d="M12 20v2"/>
                <path d="m4.93 4.93 1.41 1.41"/>
                <path d="m17.66 17.66 1.41 1.41"/>
                <path d="M2 12h2"/>
                <path d="M20 12h2"/>
                <path d="m6.34 17.66-1.41 1.41"/>
                <path d="m19.07 4.93-1.41 1.41"/>
              </svg>
            </span>
          </button>
        </div>
      </header>

      <!-- Content Grid -->
      <div class="content-grid">
        <!-- Stock List Panel -->
        <div class="panel">
          <div class="panel__header">
            <h2 class="section-title">自选股</h2>
          </div>
          <div class="panel__body">
            <ul class="stock-list" id="stockList"></ul>
            
            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
              <svg class="empty-state__icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3v18h18"/>
                <path d="M18 17V9"/>
                <path d="M13 17V5"/>
                <path d="M8 17v-3"/>
              </svg>
              <h3 class="empty-state__title">暂无自选股</h3>
              <p class="empty-state__description">点击"添加股票"按钮添加您的第一只股票</p>
              <button class="btn btn--primary" onclick="showStockInput()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14"/>
                  <path d="M5 12h14"/>
                </svg>
                添加股票
              </button>
            </div>
          </div>
        </div>

        <!-- K-Line Chart Panel -->
        <div class="kline-panel">
          <div class="panel">
            <div class="panel__header" style="display: flex; justify-content: space-between; align-items: center;">
              <h2 class="section-title">K 线图</h2>
              <div class="period-selector">
                <button class="period-btn period-btn--active" data-period="D" onclick="setPeriod('D')">日线</button>
                <button class="period-btn" data-period="W" onclick="setPeriod('W')">周线</button>
                <button class="period-btn" data-period="M" onclick="setPeriod('M')">月线</button>
              </div>
            </div>
            <div class="panel__body" style="padding: 0;">
              <div class="kline-container" id="klineContainer">
                <!-- Empty state -->
                <div class="kline-container--empty" id="klineEmptyState">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3v18h18"/>
                    <path d="M18 17V9"/>
                    <path d="M13 17V5"/>
                    <path d="M8 17v-3"/>
                  </svg>
                  <p>选择一只股票查看K线图</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Input Modal -->
  <div class="modal-backdrop" id="inputModal">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="modalTitle">输入</h3>
      </div>
      <div class="modal__body">
        <div id="stockInputFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">股票代码</label>
            <input type="text" class="form-input" id="stockCodeInput" placeholder="如：AAPL 或 NASDAQ:AAPL">
          </div>
          <div class="form-group">
            <label class="form-label">分类 (可选)</label>
            <select class="form-select" id="stockCategorySelect">
              <option value="">无分类</option>
            </select>
          </div>
        </div>
        <div id="categoryInputFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">分类名称</label>
            <input type="text" class="form-input" id="categoryNameInput" placeholder="如：科技股">
          </div>
          <div class="form-group">
            <label class="form-label">默认前缀 (可选)</label>
            <input type="text" class="form-input" id="categoryPrefixInput" placeholder="如：NASDAQ、HK、SSE">
          </div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" onclick="closeModal()">取消</button>
        <button class="btn btn--primary" onclick="submitModal()">确定</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal confirm-modal">
      <div class="modal__body">
        <p class="confirm-modal__message" id="confirmMessage">确定要执行此操作吗？</p>
      </div>
      <div class="modal__footer" style="justify-content: center;">
        <button class="btn btn--secondary" onclick="closeConfirmModal()">取消</button>
        <button class="btn btn--danger" onclick="confirmAction()">确定</button>
      </div>
    </div>
  </div>

  <!-- TradingView Widget Script -->
  <script>
    (function() {
      window.tradingViewWidget = {
        widget: null,
        stockId: 'NASDAQ:AAPL',
        period: 'D',
        isDark: false,
        
        init: function() {
          if (this.widget) return;
          const container = document.getElementById('klineContainer');
          const emptyState = document.getElementById('klineEmptyState');
          if (!container) return;
          
          // Hide empty state when initializing
          if (emptyState) emptyState.style.display = 'none';
          
          const script = document.createElement('script');
          script.src = 'https://s3.tradingview.com/tv.js';
          script.onload = () => {
            if (typeof TradingView === 'undefined') {
              console.error('TradingView library not loaded');
              return;
            }
            this.widget = new TradingView.widget({
              'autosize': true,
              'symbol': this.stockId,
              'interval': this.period,
              'timezone': 'Asia/Shanghai',
              'theme': this.isDark ? 'dark' : 'light',
              'style': '1',
              'locale': 'zh_CN',
              'toolbar_bg': this.isDark ? '#1e293b' : '#f1f3f6',
              'enable_publishing': false,
              'allow_symbol_change': true,
              'container_id': 'klineContainer',
              'hide_top_toolbar': false,
              'hide_legend': false
            });
          };
          script.onerror = () => {
            console.error('Failed to load TradingView script');
          };
          document.body.appendChild(script);
        },
        
        setStock: function(stock) {
          const code = stock.code || stock;
          // If code already has exchange prefix (contains ":"), use as-is
          // Otherwise, look up category's prefix if available
          if (code.includes(':')) {
            this.stockId = code.toUpperCase();
          } else {
            // Try to find category prefix
            const categoryId = typeof stock === 'object' ? stock.categoryId : null;
            let prefix = null;
            if (categoryId) {
              const category = categories.find(c => c.id === categoryId);
              if (category && category.prefix) {
                prefix = category.prefix;
              }
            }
            // If we have a prefix, use it; otherwise use code as-is
            this.stockId = prefix ? `${prefix}:${code.toUpperCase()}` : code.toUpperCase();
          }
          const emptyState = document.getElementById('klineEmptyState');
          if (emptyState) emptyState.style.display = 'none';
          
          // If widget exists, remove it and recreate
          if (this.widget) {
            const container = document.getElementById('klineContainer');
            container.innerHTML = '';
            this.widget = null;
          }
          
          this.init();
        },
        
        setPeriod: function(period) {
          this.period = period;
          if (this.widget && this.widget.chart) {
            this.widget.chart().setResolution(period);
          }
        },
        
        setTheme: function(dark) {
          this.isDark = dark;
        }
      };
    })();
  </script>

  <!-- Application Logic -->
  <script>
    let stocks = [];
    let categories = [];
    let preferences = { sortBy: 'addedAt', selectedStockId: null };
    let selectedCategoryId = null;
    let currentEditStockId = null;

    // Sidebar Toggle
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('sidebar--open');
    }

    // Dark Mode Toggle
    function toggleDarkMode() {
      const root = document.documentElement;
      const isDark = root.getAttribute('data-theme') === 'dark';
      root.setAttribute('data-theme', isDark ? 'light' : 'dark');
      
      // Update TradingView theme
      if (window.tradingViewWidget) {
        window.tradingViewWidget.setTheme(!isDark);
        if (window.tradingViewWidget.widget) {
          // Recreate widget with new theme
          window.tradingViewWidget.widget = null;
          window.tradingViewWidget.init();
        }
      }
      
      // Update theme icon
      const iconContainer = document.getElementById('themeIcon');
      if (iconContainer) {
        if (isDark) {
          iconContainer.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2"/>
            <path d="M12 20v2"/>
            <path d="m4.93 4.93 1.41 1.41"/>
            <path d="m17.66 17.66 1.41 1.41"/>
            <path d="M2 12h2"/>
            <path d="M20 12h2"/>
            <path d="m6.34 17.66-1.41 1.41"/>
            <path d="m19.07 4.93-1.41 1.41"/>
          </svg>`;
        } else {
          iconContainer.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>`;
        }
      }
    }

    // Filter by Category
    function filterByCategory(categoryId) {
      selectedCategoryId = categoryId || null;
      render();
      renderSidebarCategories();
    }

    // Toggle Sort
    function toggleSort() {
      preferences.sortBy = preferences.sortBy === 'addedAt' ? 'code' : 'addedAt';
      window.electronAPI.preferences.set(preferences);
      document.getElementById('sortLabel').textContent = preferences.sortBy === 'addedAt' ? '添加时间' : '股票代码';
      render();
    }

    // Initialize
    async function init() {
      if (window.electronAPI) {
        stocks = await window.electronAPI.stocks.getAll();
        categories = await window.electronAPI.categories.getAll();
        preferences = await window.electronAPI.preferences.get();
      }
      
      // Set initial theme
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (window.tradingViewWidget) {
        window.tradingViewWidget.setTheme(isDark);
        
        // Load previously selected stock
        if (preferences.selectedStockId) {
          const savedStock = stocks.find(s => s.id === preferences.selectedStockId);
          if (savedStock) {
            window.tradingViewWidget.setStock(savedStock);
          }
        }
      }
      
      render();
      renderSidebarCategories();
    }

    // Render Stock List
    function render() {
      const stockList = document.getElementById('stockList');
      const emptyState = document.getElementById('emptyState');
      
      // Filter and sort stocks
      let filteredStocks = stocks;
      if (selectedCategoryId) {
        filteredStocks = stocks.filter(s => s.categoryId === selectedCategoryId);
      }
      
      const sortedStocks = [...filteredStocks].sort((a, b) => {
        if (preferences.sortBy === 'code') {
          return a.code.localeCompare(b.code);
        }
        return b.addedAt - a.addedAt;
      });
      
      document.getElementById('sortLabel').textContent = preferences.sortBy === 'addedAt' ? '添加时间' : '股票代码';
      
      // Show/hide empty state
      if (sortedStocks.length === 0) {
        stockList.style.display = 'none';
        emptyState.style.display = 'flex';
      } else {
        stockList.style.display = 'flex';
        emptyState.style.display = 'none';
        
        stockList.innerHTML = sortedStocks.map((stock) => {
          const category = categories.find(c => c.id === stock.categoryId);
          const categoryBadge = category ? `<span class="badge">${category.name}</span>` : '';
          const isSelected = preferences.selectedStockId === stock.id;
          
          return `<li class="stock-item ${isSelected ? 'stock-item--selected' : ''}" 
              onclick="selectStock('${stock.id}')">
            <div class="stock-item__info">
              <span class="stock-item__code">${stock.code}</span>
              <span class="stock-item__name">${stock.name || ''}</span>
              ${categoryBadge}
            </div>
            <div class="stock-item__actions">
              <button class="icon-btn" aria-label="Edit category" onclick="event.stopPropagation(); editStockCategory('${stock.id}')" title="编辑分类">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 20h9"/>
                  <path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/>
                </svg>
              </button>
              <button class="icon-btn" aria-label="Delete stock" onclick="event.stopPropagation(); deleteStock('${stock.id}')" title="删除">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                  <line x1="10" y1="11" x2="10" y2="17"/>
                  <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
              </button>
            </div>
          </li>`;
        }).join('');
      }
    }

    // Render Sidebar Categories
    function renderSidebarCategories() {
      const allCategoryContainer = document.getElementById('sidebarCategories');
      const categoryListContainer = document.getElementById('sidebarCategoryList');
      const totalCount = stocks.length;
      
      // Render "全部分类" button
      allCategoryContainer.innerHTML = `
        <div class="sidebar-category ${!selectedCategoryId ? 'sidebar-category--active' : ''}" 
             data-category-id="" 
             onclick="filterByCategory('')">
          <span class="category-item__label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            全部分类
          </span>
          <span class="category-item__count">${totalCount}</span>
        </div>`;
      
      // Render category items with delete buttons
      categoryListContainer.innerHTML = categories.map((cat) => {
        const count = stocks.filter(s => s.categoryId === cat.id).length;
        const isActive = selectedCategoryId === cat.id;
        
        return `<div class="sidebar-category ${isActive ? 'sidebar-category--active' : ''}" 
                  data-category-id="${cat.id}" 
                  onclick="filterByCategory('${cat.id}')">
          <span class="category-item__label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            </svg>
            ${cat.name}
          </span>
          <div style="display: flex; align-items: center; gap: 4px;">
            <span class="category-item__count">${count}</span>
            <button class="category-delete-btn" onclick="event.stopPropagation(); deleteCategory('${cat.id}')" title="删除分类">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>`;
      }).join('');
    }

    // Delete Stock
    async function deleteStock(id) {
      await window.electronAPI.stocks.remove(id);
      stocks = await window.electronAPI.stocks.getAll();
      
      // Clear K-line if deleted stock was selected
      if (preferences.selectedStockId === id) {
        preferences.selectedStockId = null;
        await window.electronAPI.preferences.set(preferences);
        // Clear TradingView widget
        if (window.tradingViewWidget) {
          const container = document.getElementById('klineContainer');
          if (container) container.innerHTML = '';
          window.tradingViewWidget.widget = null;
        }
        const emptyState = document.getElementById('klineEmptyState');
        if (emptyState) emptyState.style.display = 'flex';
      }
      
      render();
      renderSidebarCategories();
    }

    // Edit Stock Category
    function editStockCategory(stockId) {
      const stock = stocks.find(s => s.id === stockId);
      if (!stock) return;
      currentEditStockId = stockId;
      
      showModal('修改分类', 'stock-edit', async (data) => {
        if (data && data.categoryId !== undefined) {
          stock.categoryId = data.categoryId || null;
          await window.electronAPI.stocks.update(stock);
          showToast(`已更新分类`, 'success');
          stocks = await window.electronAPI.stocks.getAll();
          render();
          renderSidebarCategories();
        }
        currentEditStockId = null;
      });
    }

    // Delete Category
    async function deleteCategory(id) {
      await window.electronAPI.categories.remove(id);
      categories = await window.electronAPI.categories.getAll();
      
      // Clear category filter if deleted category was selected
      if (selectedCategoryId === id) {
        selectedCategoryId = null;
      }
      
      render();
      renderSidebarCategories();
    }

    // Select Stock
    async function selectStock(id) {
      preferences.selectedStockId = id;
      const stock = stocks.find((s) => s.id === id);
      if (stock && window.tradingViewWidget) {
        setPeriod('D');
        window.tradingViewWidget.setStock(stock);
      }
      await window.electronAPI.preferences.set(preferences);
      render();
    }

    // Set Period
    function setPeriod(period) {
      if (!window.tradingViewWidget) return;
      window.tradingViewWidget.setPeriod(period);
      
      const buttons = document.querySelectorAll('.period-btn');
      buttons.forEach((btn) => {
        const btnPeriod = btn.getAttribute('data-period');
        btn.classList.toggle('period-btn--active', btnPeriod === period);
      });
    }

    // Modal Functions
    let modalCallback = null;
    let modalType = null;

    function showModal(title, type, callback, preSelectedCategoryId = null) {
      const modal = document.getElementById('inputModal');
      modal.classList.add('modal-backdrop--open');
      document.getElementById('modalTitle').textContent = title;
      modalType = type;
      modalCallback = callback;

      const stockFields = document.getElementById('stockInputFields');
      const categoryFields = document.getElementById('categoryInputFields');

      if (type === 'stock' || type === 'stock-edit') {
        stockFields.style.display = 'block';
        categoryFields.style.display = 'none';
        const categorySelect = document.getElementById('stockCategorySelect');
        const stockCodeInput = document.getElementById('stockCodeInput');
        categorySelect.innerHTML = '<option value="">无分类</option>' +
          categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        
        if (type === 'stock-edit') {
          const currentStock = stocks.find(s => s.id === currentEditStockId);
          if (currentStock) {
            categorySelect.value = currentStock.categoryId || '';
          }
          document.getElementById('stockCodeInput').parentElement.style.display = 'none';
        } else {
          document.getElementById('stockCodeInput').parentElement.style.display = 'block';
          document.getElementById('stockCodeInput').value = '';
          // Auto-select the pre-selected category from sidebar
          if (preSelectedCategoryId) {
            categorySelect.value = preSelectedCategoryId;
          }
        }
        // Focus on stock code input when category is pre-selected, otherwise focus on category
        if (preSelectedCategoryId) {
          setTimeout(() => stockCodeInput.focus(), 50);
        } else {
          setTimeout(() => categorySelect.focus(), 50);
        }
      } else if (type === 'category') {
        stockFields.style.display = 'none';
        categoryFields.style.display = 'block';
        document.getElementById('categoryNameInput').value = '';
        document.getElementById('categoryPrefixInput').value = '';
        setTimeout(() => document.getElementById('categoryNameInput').focus(), 50);
      }
    }

    function closeModal() {
      const modal = document.getElementById('inputModal');
      modal.classList.remove('modal-backdrop--open');
      modalCallback = null;
      modalType = null;
    }

    function submitModal() {
      let value;
      if (modalType === 'stock') {
        const code = document.getElementById('stockCodeInput').value.trim();
        const categoryId = document.getElementById('stockCategorySelect').value || null;
        value = { code, categoryId };
      } else if (modalType === 'category') {
        const name = document.getElementById('categoryNameInput').value.trim();
        const prefix = document.getElementById('categoryPrefixInput').value.trim();
        value = { name, prefix: prefix || undefined };
      }
      const callback = modalCallback;
      closeModal();
      if (callback) {
        callback(value);
      }
    }

    // Confirm Modal
    let confirmCallback = null;

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      
      const icon = type === 'success' 
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        : type === 'error'
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
      
      toast.innerHTML = `
        <span style="color: ${type === 'success' ? 'var(--color-success)' : type === 'error' ? 'var(--color-error)' : 'var(--color-warning)'}">${icon}</span>
        <span class="toast__message">${message}</span>
        <button class="toast__close" onclick="this.parentElement.remove()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      `;
      
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toast-out 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function showConfirmModal(message, callback) {
      const modal = document.getElementById('confirmModal');
      modal.classList.add('modal-backdrop--open');
      document.getElementById('confirmMessage').textContent = message;
      confirmCallback = callback;
    }

    function closeConfirmModal() {
      const modal = document.getElementById('confirmModal');
      modal.classList.remove('modal-backdrop--open');
      confirmCallback = null;
    }

    function confirmAction() {
      if (confirmCallback) {
        confirmCallback();
      }
      closeConfirmModal();
    }

    // Button Handlers
    function showStockInput() {
      showModal('添加股票', 'stock', async (data) => {
        if (data && data.code) {
          const stock = await window.electronAPI.stocks.add({ 
            code: data.code,
            categoryId: data.categoryId 
          });
          showToast(`已添加股票: ${stock.code}`, 'success');
          stocks = await window.electronAPI.stocks.getAll();
          render();
          renderSidebarCategories();
        }
      }, selectedCategoryId); // Pass selected category
    }

    function showCategoryInput() {
      showModal('创建分类', 'category', async (data) => {
        if (data && data.name) {
          // Check for duplicate category name
          const exists = categories.some(cat => cat.name.toLowerCase() === data.name.toLowerCase());
          if (exists) {
            showToast(`分类 "${data.name}" 已存在`, 'error');
            return;
          }
          const category = await window.electronAPI.categories.add({ 
            name: data.name,
            prefix: data.prefix
          });
          showToast(`已创建分类: ${category.name}`, 'success');
          categories = await window.electronAPI.categories.getAll();
          render();
          renderSidebarCategories();
        }
      });
    }

    function showResetConfirm() {
      showConfirmModal('确定要删除所有数据吗？', async () => {
        await window.electronAPI.preferences.set({ sortBy: 'addedAt', selectedStockId: null });
        stocks = [];
        categories = [];
        preferences = { sortBy: 'addedAt', selectedStockId: null };
        selectedCategoryId = null;
        render();
        renderSidebarCategories();
        
        const emptyState = document.getElementById('klineEmptyState');
        if (emptyState) emptyState.style.display = 'flex';
        
        showToast('数据已重置', 'success');
      });
    }

    // Keyboard Events
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('inputModal').classList.contains('modal-backdrop--open')) {
        submitModal();
      }
      if (e.key === 'Escape') {
        if (document.getElementById('inputModal').classList.contains('modal-backdrop--open')) {
          closeModal();
        }
        if (document.getElementById('confirmModal').classList.contains('modal-backdrop--open')) {
          closeConfirmModal();
        }
      }
    });

    // Close modal on backdrop click
    document.getElementById('inputModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-backdrop--open') || e.target.classList.contains('modal-backdrop')) {
        closeModal();
      }
    });

    document.getElementById('confirmModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-backdrop--open') || e.target.classList.contains('modal-backdrop')) {
        closeConfirmModal();
      }
    });

    // Initialize
    init();
  </script>
</body>
</html>
